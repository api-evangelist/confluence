openapi: 3.1.0
info:
  title: Confluence Cloud REST API v2
  description: >-
    Next generation REST API for Confluence Cloud providing access to pages,
    spaces, comments, blog posts, attachments, labels, and other content
    management operations. This API offers improved performance, consistent
    pagination, and new features compared to the v1 API.
  version: 2.0.0
  contact:
    name: Atlassian
    url: https://developer.atlassian.com/cloud/confluence/
    email: ecosystem@atlassian.com
  license:
    name: Atlassian Developer Terms
    url: https://developer.atlassian.com/platform/marketplace/atlassian-developer-terms/
  termsOfService: https://www.atlassian.com/legal/cloud-terms-of-service
  x-logo:
    url: https://www.atlassian.com/dam/jcr:5d1374c2-276f-4bca-9ce4-b3f5e2dd5d6c/confluence-icon-gradient-blue.svg
servers:
- url: https://{domain}.atlassian.net/wiki/api/v2
  description: Confluence Cloud
  variables:
    domain:
      default: your-domain
      description: Your Atlassian Cloud site domain
security:
- basicAuth: []
- oAuth2: []
- bearerAuth: []
tags:
- name: Page
  description: Create, retrieve, update, and delete pages
  externalDocs:
    url: https://developer.atlassian.com/cloud/confluence/rest/v2/api-group-page/
- name: Space
  description: Retrieve and manage Confluence spaces
  externalDocs:
    url: https://developer.atlassian.com/cloud/confluence/rest/v2/api-group-space/
- name: Comment
  description: Create, retrieve, update, and delete comments on pages and blog posts
  externalDocs:
    url: https://developer.atlassian.com/cloud/confluence/rest/v2/api-group-comment/
- name: Blog Post
  description: Create, retrieve, update, and delete blog posts
  externalDocs:
    url: https://developer.atlassian.com/cloud/confluence/rest/v2/api-group-blog-post/
- name: Attachment
  description: Manage file attachments on content
  externalDocs:
    url: https://developer.atlassian.com/cloud/confluence/rest/v2/api-group-attachment/
- name: Label
  description: Manage labels on content
  externalDocs:
    url: https://developer.atlassian.com/cloud/confluence/rest/v2/api-group-label/
paths:
  /pages:
    get:
      operationId: getPages
      summary: Get Pages
      description: >-
        Returns all pages. The number of results is limited by the limit
        parameter and additional results can be retrieved via the next cursor.
        Results can be filtered by space, status, title, and body format.
      tags:
      - Page
      parameters:
      - $ref: '#/components/parameters/PageIdParam'
      - $ref: '#/components/parameters/SpaceIdFilter'
      - $ref: '#/components/parameters/StatusFilter'
      - $ref: '#/components/parameters/TitleFilter'
      - $ref: '#/components/parameters/BodyFormatParam'
      - $ref: '#/components/parameters/SortParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Returned if the requested pages are returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageBulk'
              examples:
                Getpages200Example:
                  summary: Default getPages 200 response
                  x-microcks-default: true
                  value:
                    results:
                    - id: abc123
                      status: current
                      title: Example Title
                      spaceId: '500123'
                      parentId: '500123'
                      parentType: page
                      position: 10
                      authorId: '500123'
                      ownerId: '500123'
                      lastOwnerId: '500123'
                      createdAt: '2026-01-15T10:30:00Z'
                    _links:
                      next: example_value
                      base: example_value
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createPage
      summary: Create Page
      description: >-
        Creates a page in the space. Pages can be created as a child of another
        page by specifying the parentId. Pages are created in the current
        status (draft or current).
      tags:
      - Page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageCreateRequest'
            examples:
              CreatepageRequestExample:
                summary: Default createPage request
                x-microcks-default: true
                value:
                  spaceId: '500123'
                  status: current
                  title: Example Title
                  parentId: '500123'
                  body:
                    representation: storage
                    value: example_value
      responses:
        '200':
          description: Returned if the page was created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
              examples:
                Createpage200Example:
                  summary: Default createPage 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    status: current
                    title: Example Title
                    spaceId: '500123'
                    parentId: '500123'
                    parentType: page
                    position: 10
                    authorId: '500123'
                    ownerId: '500123'
                    lastOwnerId: '500123'
                    createdAt: '2026-01-15T10:30:00Z'
                    version:
                      createdAt: '2026-01-15T10:30:00Z'
                      message: example_value
                      number: 10
                      minorEdit: true
                      authorId: '500123'
                    body: {}
                    labels:
                      results:
                      - {}
                    properties:
                      results:
                      - {}
                    operations:
                      results:
                      - {}
                    likes:
                      results:
                      - {}
                    versions:
                      results:
                      - {}
                    _links:
                      webui: example_value
                      editui: example_value
                      tinyui: example_value
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /pages/{id}:
    get:
      operationId: getPageById
      summary: Get Page by Id
      description: >-
        Returns a specific page. The response includes the page body in the
        requested format, version information, and links.
      tags:
      - Page
      parameters:
      - $ref: '#/components/parameters/ContentIdPath'
      - $ref: '#/components/parameters/BodyFormatParam'
      - $ref: '#/components/parameters/GetDraftParam'
      - $ref: '#/components/parameters/VersionParam'
      responses:
        '200':
          description: Returned if the requested page is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
              examples:
                Getpagebyid200Example:
                  summary: Default getPageById 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    status: current
                    title: Example Title
                    spaceId: '500123'
                    parentId: '500123'
                    parentType: page
                    position: 10
                    authorId: '500123'
                    ownerId: '500123'
                    lastOwnerId: '500123'
                    createdAt: '2026-01-15T10:30:00Z'
                    version:
                      createdAt: '2026-01-15T10:30:00Z'
                      message: example_value
                      number: 10
                      minorEdit: true
                      authorId: '500123'
                    body: {}
                    labels:
                      results:
                      - {}
                    properties:
                      results:
                      - {}
                    operations:
                      results:
                      - {}
                    likes:
                      results:
                      - {}
                    versions:
                      results:
                      - {}
                    _links:
                      webui: example_value
                      editui: example_value
                      tinyui: example_value
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: updatePage
      summary: Update Page
      description: >-
        Updates a page by id. The request body must include the current version
        number, the new title, the space id, the status, and the body in the
        specified representation.
      tags:
      - Page
      parameters:
      - $ref: '#/components/parameters/ContentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageUpdateRequest'
            examples:
              UpdatepageRequestExample:
                summary: Default updatePage request
                x-microcks-default: true
                value:
                  id: abc123
                  status: current
                  title: Example Title
                  spaceId: '500123'
                  parentId: '500123'
                  body:
                    representation: storage
                    value: example_value
                  version:
                    number: 10
                    message: example_value
      responses:
        '200':
          description: Returned if the page was updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
              examples:
                Updatepage200Example:
                  summary: Default updatePage 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    status: current
                    title: Example Title
                    spaceId: '500123'
                    parentId: '500123'
                    parentType: page
                    position: 10
                    authorId: '500123'
                    ownerId: '500123'
                    lastOwnerId: '500123'
                    createdAt: '2026-01-15T10:30:00Z'
                    version:
                      createdAt: '2026-01-15T10:30:00Z'
                      message: example_value
                      number: 10
                      minorEdit: true
                      authorId: '500123'
                    body: {}
                    labels:
                      results:
                      - {}
                    properties:
                      results:
                      - {}
                    operations:
                      results:
                      - {}
                    likes:
                      results:
                      - {}
                    versions:
                      results:
                      - {}
                    _links:
                      webui: example_value
                      editui: example_value
                      tinyui: example_value
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deletePage
      summary: Delete Page
      description: >-
        Deletes a page by id. By default pages are moved to trash. To purge a
        page permanently, set the purge parameter to true.
      tags:
      - Page
      parameters:
      - $ref: '#/components/parameters/ContentIdPath'
      - name: purge
        in: query
        description: If true, the page is permanently deleted instead of moved to trash.
        schema:
          type: boolean
          default: false
        example: true
      responses:
        '204':
          description: Returned if the page was deleted successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /pages/{id}/children:
    get:
      operationId: getChildPages
      summary: Get Child Pages
      description: Returns the child pages of a specific page, ordered by position in the page tree.
      tags:
      - Page
      parameters:
      - $ref: '#/components/parameters/ContentIdPath'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Returned if the child pages are returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageBulk'
              examples:
                Getchildpages200Example:
                  summary: Default getChildPages 200 response
                  x-microcks-default: true
                  value:
                    results:
                    - id: abc123
                      status: current
                      title: Example Title
                      spaceId: '500123'
                      parentId: '500123'
                      parentType: page
                      position: 10
                      authorId: '500123'
                      ownerId: '500123'
                      lastOwnerId: '500123'
                      createdAt: '2026-01-15T10:30:00Z'
                    _links:
                      next: example_value
                      base: example_value
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /pages/{id}/labels:
    get:
      operationId: getPageLabels
      summary: Get Labels for Page
      description: Returns the labels associated with a specific page.
      tags:
      - Label
      parameters:
      - $ref: '#/components/parameters/ContentIdPath'
      - $ref: '#/components/parameters/LabelPrefixParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Returned if the labels are returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelArray'
              examples:
                Getpagelabels200Example:
                  summary: Default getPageLabels 200 response
                  x-microcks-default: true
                  value:
                    results:
                    - id: abc123
                      name: Example Title
                      prefix: example_value
                    _links:
                      next: example_value
                      base: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /spaces:
    get:
      operationId: getSpaces
      summary: Get Spaces
      description: >-
        Returns all spaces. The results can be filtered by space type, status,
        and labels. Pagination is cursor-based.
      tags:
      - Space
      parameters:
      - name: ids
        in: query
        description: Filter by space IDs. Multiple IDs can be specified as comma-separated values.
        schema:
          type: array
          items:
            type: integer
            format: int64
        example: []
      - name: keys
        in: query
        description: Filter by space keys. Multiple keys can be specified as comma-separated values.
        schema:
          type: array
          items:
            type: string
        example: []
      - name: type
        in: query
        description: Filter by space type.
        schema:
          type: string
          enum:
          - global
          - personal
        example: global
      - name: status
        in: query
        description: Filter by space status.
        schema:
          type: string
          enum:
          - current
          - archived
        example: current
      - name: labels
        in: query
        description: Filter by space labels. Multiple labels can be specified.
        schema:
          type: array
          items:
            type: string
        example: []
      - $ref: '#/components/parameters/SortParam'
      - $ref: '#/components/parameters/DescriptionFormatParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Returned if the requested spaces are returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpaceBulk'
              examples:
                Getspaces200Example:
                  summary: Default getSpaces 200 response
                  x-microcks-default: true
                  value:
                    results:
                    - id: abc123
                      key: example_value
                      name: Example Title
                      type: global
                      status: current
                      authorId: '500123'
                      createdAt: '2026-01-15T10:30:00Z'
                      homepageId: '500123'
                    _links:
                      next: example_value
                      base: example_value
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /spaces/{id}:
    get:
      operationId: getSpaceById
      summary: Get Space by Id
      description: Returns a specific space by its id.
      tags:
      - Space
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the space.
        schema:
          type: integer
          format: int64
        example: abc123
      - $ref: '#/components/parameters/DescriptionFormatParam'
      responses:
        '200':
          description: Returned if the requested space is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Space'
              examples:
                Getspacebyid200Example:
                  summary: Default getSpaceById 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    key: example_value
                    name: Example Title
                    type: global
                    status: current
                    authorId: '500123'
                    createdAt: '2026-01-15T10:30:00Z'
                    homepageId: '500123'
                    description: {}
                    icon:
                      path: example_value
                      apiDownloadLink: example_value
                    labels:
                      results:
                      - {}
                    properties:
                      results:
                      - {}
                    operations:
                      results:
                      - {}
                    permissions:
                      results:
                      - {}
                    _links:
                      webui: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /spaces/{id}/pages:
    get:
      operationId: getPagesInSpace
      summary: Get Pages in Space
      description: Returns all pages in a specific space. Supports filtering by status and depth.
      tags:
      - Page
      - Space
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the space.
        schema:
          type: integer
          format: int64
        example: abc123
      - name: depth
        in: query
        description: Filter by depth in the page tree. Use root to get only top-level pages.
        schema:
          type: string
          enum:
          - all
          - root
        example: all
      - $ref: '#/components/parameters/StatusFilter'
      - $ref: '#/components/parameters/BodyFormatParam'
      - $ref: '#/components/parameters/SortParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Returned if the pages in the space are returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageBulk'
              examples:
                Getpagesinspace200Example:
                  summary: Default getPagesInSpace 200 response
                  x-microcks-default: true
                  value:
                    results:
                    - id: abc123
                      status: current
                      title: Example Title
                      spaceId: '500123'
                      parentId: '500123'
                      parentType: page
                      position: 10
                      authorId: '500123'
                      ownerId: '500123'
                      lastOwnerId: '500123'
                      createdAt: '2026-01-15T10:30:00Z'
                    _links:
                      next: example_value
                      base: example_value
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /pages/{id}/footer-comments:
    get:
      operationId: getFooterComments
      summary: Get Footer Comments for Page
      description: Returns the footer comments of a specific page.
      tags:
      - Comment
      parameters:
      - $ref: '#/components/parameters/ContentIdPath'
      - $ref: '#/components/parameters/BodyFormatParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Returned if the footer comments are returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentBulk'
              examples:
                Getfootercomments200Example:
                  summary: Default getFooterComments 200 response
                  x-microcks-default: true
                  value:
                    results:
                    - id: abc123
                      status: current
                      title: Example Title
                      blogPostId: '500123'
                      pageId: '500123'
                      parentCommentId: '500123'
                      authorId: '500123'
                      createdAt: '2026-01-15T10:30:00Z'
                      resolutionStatus: open
                    _links:
                      next: example_value
                      base: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /pages/{id}/inline-comments:
    get:
      operationId: getInlineComments
      summary: Get Inline Comments for Page
      description: Returns the inline comments of a specific page.
      tags:
      - Comment
      parameters:
      - $ref: '#/components/parameters/ContentIdPath'
      - $ref: '#/components/parameters/BodyFormatParam'
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Returned if the inline comments are returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentBulk'
              examples:
                Getinlinecomments200Example:
                  summary: Default getInlineComments 200 response
                  x-microcks-default: true
                  value:
                    results:
                    - id: abc123
                      status: current
                      title: Example Title
                      blogPostId: '500123'
                      pageId: '500123'
                      parentCommentId: '500123'
                      authorId: '500123'
                      createdAt: '2026-01-15T10:30:00Z'
                      resolutionStatus: open
                    _links:
                      next: example_value
                      base: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /footer-comments:
    post:
      operationId: createFooterComment
      summary: Create Footer Comment
      description: Creates a footer comment on a page or blog post.
      tags:
      - Comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreateRequest'
            examples:
              CreatefootercommentRequestExample:
                summary: Default createFooterComment request
                x-microcks-default: true
                value:
                  blogPostId: '500123'
                  pageId: '500123'
                  parentCommentId: '500123'
                  body:
                    representation: storage
                    value: example_value
      responses:
        '200':
          description: Returned if the comment was created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
              examples:
                Createfootercomment200Example:
                  summary: Default createFooterComment 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    status: current
                    title: Example Title
                    blogPostId: '500123'
                    pageId: '500123'
                    parentCommentId: '500123'
                    authorId: '500123'
                    createdAt: '2026-01-15T10:30:00Z'
                    version:
                      createdAt: '2026-01-15T10:30:00Z'
                      message: example_value
                      number: 10
                      minorEdit: true
                      authorId: '500123'
                    body: {}
                    resolutionStatus: open
                    properties:
                      textSelection: example_value
                      textSelectionMatchCount: 10
                    _links:
                      webui: example_value
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /inline-comments:
    post:
      operationId: createInlineComment
      summary: Create Inline Comment
      description: Creates an inline comment on a page or blog post. Inline comments are anchored to a specific text selection.
      tags:
      - Comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InlineCommentCreateRequest'
            examples:
              CreateinlinecommentRequestExample:
                summary: Default createInlineComment request
                x-microcks-default: true
                value:
                  blogPostId: '500123'
                  pageId: '500123'
                  body:
                    representation: storage
                    value: example_value
                  inlineCommentProperties:
                    textSelection: example_value
                    textSelectionMatchCount: 10
      responses:
        '200':
          description: Returned if the inline comment was created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
              examples:
                Createinlinecomment200Example:
                  summary: Default createInlineComment 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    status: current
                    title: Example Title
                    blogPostId: '500123'
                    pageId: '500123'
                    parentCommentId: '500123'
                    authorId: '500123'
                    createdAt: '2026-01-15T10:30:00Z'
                    version:
                      createdAt: '2026-01-15T10:30:00Z'
                      message: example_value
                      number: 10
                      minorEdit: true
                      authorId: '500123'
                    body: {}
                    resolutionStatus: open
                    properties:
                      textSelection: example_value
                      textSelectionMatchCount: 10
                    _links:
                      webui: example_value
        '400':
          $ref: '#/components/responses/BadRequest'
