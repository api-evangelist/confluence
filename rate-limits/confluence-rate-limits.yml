specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Confluence Cloud
providerId: confluence
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Wiki
description: Confluence Cloud REST API rate limits per app/user/tenant.
sources:
  - https://www.atlassian.com/software/confluence/pricing
  - https://developer.atlassian.com/cloud/confluence/rate-limiting/
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Per app per user per tenant
    scope: app/user/tenant
    metric: requests_per_second
    limit: 10
    timeFrame: second
  - name: Bulk operations
    scope: request
    metric: items
    limit: 100
    timeFrame: request
