specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Confluence Cloud
providerId: confluence
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Wiki
  - Documentation
  - Collaboration
description: Confluence Cloud per-user-per-month plans (annual billing rates shown).
sources:
  - https://www.atlassian.com/software/confluence/pricing
plans:
  - id: confluence-free
    name: Free
    type: freemium
    description: Free forever for up to 10 users.
    entries:
      - label: Users
        name: users
        type: quota
        metric: user
        limit: 10
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Up to 10 users
      - name: Unlimited spaces and pages
      - name: Macros and templates
      - name: 2 GB storage
      - name: Best-effort support
  - id: confluence-standard
    name: Standard
    type: paid
    description: $6.05/user/month with 250 GB storage.
    entries:
      - label: Per user (avg)
        name: seat
        type: subscription
        metric: user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '6.05'
        userMultiplied: true
      - label: Storage
        name: storage
        type: quota
        metric: GB
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Permissions and roles
      - name: Page restrictions
      - name: Audit logs
      - name: Standard support
  - id: confluence-premium
    name: Premium
    type: paid
    description: $11.55/user/month with unlimited storage.
    entries:
      - label: Per user (avg)
        name: seat
        type: subscription
        metric: user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '11.55'
        userMultiplied: true
      - label: Storage
        name: storage
        type: quota
        metric: GB
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Analytics
      - name: Bulk archive/delete
      - name: Page versioning
      - name: Sandbox
      - name: 24/7 Premium support
  - id: confluence-enterprise
    name: Enterprise
    type: enterprise
    description: Typically $23-$25/user/month for large orgs.
    entries:
      - label: Per user (custom)
        name: seat
        type: subscription
        metric: user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: true
    elements:
      - name: Atlassian Intelligence AI
      - name: 99.95% uptime
      - name: Centralized security
      - name: 24/7 enterprise support
      - name: Data residency
