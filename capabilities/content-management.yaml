    - name: labels
      path: /labels/{id}
      description: Retrieve label information
      operations:
      - name: get-label-by-id
        method: GET
        description: Returns a specific label by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The label ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: confluence-content-api
    description: Unified REST API for Confluence content management workflows.
    resources:
    - path: /v1/pages
      name: pages
      description: Manage Confluence pages
      operations:
      - method: GET
        name: list-pages
        description: List all pages with optional filtering
        call: confluence-cloud-v2.get-pages
        with:
          space-id: rest.space_id
          status: rest.status
          title: rest.title
          cursor: rest.cursor
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-page
        description: Create a new page
        call: confluence-cloud-v2.create-page
        with:
          space_id: rest.space_id
          title: rest.title
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pages/{id}
      name: page-by-id
      description: Individual page operations
      operations:
      - method: GET
        name: get-page
        description: Get a page by ID
        call: confluence-cloud-v2.get-page-by-id
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-page
        description: Update a page
        call: confluence-cloud-v2.update-page
        with:
          id: rest.id
          title: rest.title
          body: rest.body
          version: rest.version
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-page
        description: Delete a page
        call: confluence-cloud-v2.delete-page
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pages/{id}/children
      name: child-pages
      description: Child page navigation
      operations:
      - method: GET
        name: list-child-pages
        description: List child pages
        call: confluence-cloud-v2.get-child-pages
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pages/{id}/labels
      name: page-labels
      description: Page label management
      operations:
      - method: GET
        name: get-page-labels
        description: Get labels for a page
        call: confluence-cloud-v2.get-page-labels
