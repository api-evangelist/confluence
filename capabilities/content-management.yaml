naftiko: 1.0.0-alpha2
info:
  label: Confluence Content Management
  description: Unified workflow for managing Confluence content including pages, blog posts, comments, attachments, spaces,
    and labels. Used by content authors, knowledge managers, and platform administrators.
  tags:
  - Confluence
  - Content Management
  - Collaboration
  - Wiki
  - Knowledge Base
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    CONFLUENCE_API_TOKEN: CONFLUENCE_API_TOKEN
    CONFLUENCE_EMAIL: CONFLUENCE_EMAIL
capability:
  consumes:
  - type: http
    namespace: confluence-cloud-v2
    baseUri: https://{domain}.atlassian.net/wiki/api/v2
    description: Next generation Confluence Cloud REST API with improved performance and new features.
    authentication:
      type: basic
      username: '{{CONFLUENCE_EMAIL}}'
      password: '{{CONFLUENCE_API_TOKEN}}'
    resources:
    - name: pages
      path: /pages
      description: Manage Confluence pages
      operations:
      - name: get-pages
        method: GET
        description: Returns all pages with optional filtering by space, status, and title.
        inputParameters:
        - name: space-id
          in: query
          type: string
          required: false
          description: Filter by space ID
        - name: status
          in: query
          type: string
          required: false
          description: Filter by page status
        - name: title
          in: query
          type: string
          required: false
          description: Filter by page title
        - name: body-format
          in: query
          type: string
          required: false
          description: Body format to return
        - name: cursor
          in: query
          type: string
          required: false
          description: Pagination cursor
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-page
        method: POST
        description: Creates a new page in a Confluence space.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            spaceId: '{{tools.space_id}}'
            title: '{{tools.title}}'
            body: '{{tools.body}}'
    - name: page-by-id
      path: /pages/{id}
      description: Manage individual pages by ID
      operations:
      - name: get-page-by-id
        method: GET
        description: Returns a specific page by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The page ID
        - name: body-format
          in: query
          type: string
          required: false
          description: Body format to return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-page
        method: PUT
        description: Updates a page by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The page ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            title: '{{tools.title}}'
            body: '{{tools.body}}'
            version: '{{tools.version}}'
      - name: delete-page
        method: DELETE
        description: Deletes a page by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The page ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: child-pages
      path: /pages/{id}/children
      description: Retrieve child pages
      operations:
      - name: get-child-pages
        method: GET
        description: Returns child pages of a specific page.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The parent page ID
        - name: cursor
          in: query
          type: string
          required: false
          description: Pagination cursor
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: page-labels
      path: /pages/{id}/labels
      description: Manage page labels
      operations:
      - name: get-page-labels
        method: GET
        description: Returns labels for a specific page.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The page ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: spaces
      path: /spaces
      description: Manage Confluence spaces
      operations:
      - name: get-spaces
        method: GET
        description: Returns all spaces with optional filtering.
        inputParameters:
        - name: cursor
          in: query
          type: string
          required: false
          description: Pagination cursor
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: space-by-id
      path: /spaces/{id}
      description: Retrieve a specific space
      operations:
      - name: get-space-by-id
        method: GET
        description: Returns a specific space by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The space ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pages-in-space
      path: /spaces/{id}/pages
      description: Retrieve pages within a space
      operations:
      - name: get-pages-in-space
        method: GET
        description: Returns pages belonging to a specific space.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The space ID
        - name: cursor
          in: query
          type: string
          required: false
          description: Pagination cursor
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: comments
      path: /comments/{id}
      description: Manage comments
      operations:
      - name: get-comment-by-id
        method: GET
        description: Returns a specific comment by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The comment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-comment
        method: PUT
        description: Updates a comment by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The comment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            body: '{{tools.body}}'
            version: '{{tools.version}}'
      - name: delete-comment
        method: DELETE
        description: Deletes a comment by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The comment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: footer-comments
      path: /footer-comments
      description: Create footer comments
      operations:
      - name: create-footer-comment
        method: POST
        description: Creates a footer comment on a page or blog post.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            pageId: '{{tools.page_id}}'
            body: '{{tools.body}}'
    - name: inline-comments
      path: /inline-comments
      description: Create inline comments
      operations:
      - name: create-inline-comment
        method: POST
        description: Creates an inline comment on a page.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            pageId: '{{tools.page_id}}'
            body: '{{tools.body}}'
            inlineCommentProperties: '{{tools.properties}}'
    - name: page-footer-comments
      path: /pages/{id}/footer-comments
      description: Retrieve page footer comments
      operations:
      - name: get-footer-comments
        method: GET
        description: Returns footer comments for a specific page.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The page ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: page-inline-comments
      path: /pages/{id}/inline-comments
      description: Retrieve page inline comments
      operations:
      - name: get-inline-comments
        method: GET
        description: Returns inline comments for a specific page.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The page ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: child-comments
      path: /comments/{id}/children
      description: Retrieve child comments
      operations:
      - name: get-child-comments
        method: GET
        description: Returns child comments of a specific comment.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The parent comment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: blog-posts
      path: /blogposts
      description: Manage blog posts
      operations:
      - name: get-blog-posts
        method: GET
        description: Returns all blog posts.
        inputParameters:
        - name: space-id
          in: query
          type: string
          required: false
          description: Filter by space ID
        - name: cursor
          in: query
          type: string
          required: false
          description: Pagination cursor
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-blog-post
        method: POST
        description: Creates a new blog post.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            spaceId: '{{tools.space_id}}'
            title: '{{tools.title}}'
            body: '{{tools.body}}'
    - name: blog-post-by-id
      path: /blogposts/{id}
      description: Manage individual blog posts
      operations:
      - name: get-blog-post-by-id
        method: GET
        description: Returns a specific blog post by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The blog post ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-blog-post
        method: PUT
        description: Updates a blog post by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The blog post ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            title: '{{tools.title}}'
            body: '{{tools.body}}'
            version: '{{tools.version}}'
      - name: delete-blog-post
        method: DELETE
        description: Deletes a blog post by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The blog post ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
