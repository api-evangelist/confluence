    - name: attachments
      path: /attachments/{id}
      description: Manage attachments
      operations:
      - name: get-attachment-by-id
        method: GET
        description: Returns a specific attachment by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
