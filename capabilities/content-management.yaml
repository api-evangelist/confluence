      operations:
      - method: GET
        name: list-spaces
        description: List all spaces
        call: confluence-cloud-v2.get-spaces
        with:
          cursor: rest.cursor
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/spaces/{id}
      name: space-by-id
