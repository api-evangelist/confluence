    - name: page-attachments
      path: /pages/{id}/attachments
      description: Retrieve page attachments
      operations:
      - name: get-page-attachments
        method: GET
        description: Returns attachments for a specific page.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The page ID
        outputRawFormat: json
        outputParameters:
