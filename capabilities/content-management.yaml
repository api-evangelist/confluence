      outputParameters:
      - type: object
        mapping: $.
    - name: list-spaces
      description: List all Confluence spaces.
      hints:
        readOnly: true
        openWorld: true
      call: confluence-cloud-v2.get-spaces
      with:
        cursor: tools.cursor
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-space
      description: Get a specific Confluence space by its ID.
      hints:
        readOnly: true
        openWorld: true
      call: confluence-cloud-v2.get-space-by-id
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-pages-in-space
      description: List all pages belonging to a specific space.
      hints:
        readOnly: true
        openWorld: true
      call: confluence-cloud-v2.get-pages-in-space
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-blog-posts
      description: List all blog posts with optional space filtering.
      hints:
        readOnly: true
        openWorld: true
      call: confluence-cloud-v2.get-blog-posts
      with:
        space-id: tools.space_id
        cursor: tools.cursor
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: create-blog-post
      description: Create a new Confluence blog post.
      hints:
        readOnly: false
      call: confluence-cloud-v2.create-blog-post
      with:
        space_id: tools.space_id
        title: tools.title
        body: tools.body
      outputParameters:
      - type: object
