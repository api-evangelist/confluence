naftiko: 1.0.0-alpha2
info:
  label: Confluence Cloud REST API v2 — Space
  description: 'Confluence Cloud REST API v2 — Space. 3 operations. Lead operation: Get Spaces. Self-contained Naftiko capability
    covering one Confluence business surface.'
  tags:
  - Confluence
  - Space
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONFLUENCE_API_KEY: CONFLUENCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-v2-space
    baseUri: https://{domain}.atlassian.net/wiki/api/v2
    description: Confluence Cloud REST API v2 — Space business capability. Self-contained, no shared references.
    resources:
    - name: spaces
      path: /spaces
      operations:
      - name: getspaces
        method: GET
        description: Get Spaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ids
          in: query
          type: array
          description: Filter by space IDs. Multiple IDs can be specified as comma-separated values.
        - name: keys
          in: query
          type: array
          description: Filter by space keys. Multiple keys can be specified as comma-separated values.
        - name: type
          in: query
          type: string
          description: Filter by space type.
        - name: status
          in: query
          type: string
          description: Filter by space status.
        - name: labels
          in: query
          type: array
          description: Filter by space labels. Multiple labels can be specified.
    - name: spaces-id
      path: /spaces/{id}
      operations:
      - name: getspacebyid
        method: GET
        description: Get Space by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the space.
          required: true
    - name: spaces-id-pages
      path: /spaces/{id}/pages
      operations:
      - name: getpagesinspace
        method: GET
        description: Get Pages in Space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The ID of the space.
          required: true
        - name: depth
          in: query
          type: string
          description: Filter by depth in the page tree. Use root to get only top-level pages.
    authentication:
      type: bearer
      token: '{{env.CONFLUENCE_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-v2-space-rest
    port: 8080
    description: REST adapter for Confluence Cloud REST API v2 — Space. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/spaces
      name: spaces
      description: REST surface for spaces.
      operations:
      - method: GET
        name: getspaces
        description: Get Spaces
        call: cloud-v2-space.getspaces
        with:
          ids: rest.ids
          keys: rest.keys
          type: rest.type
          status: rest.status
          labels: rest.labels
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/spaces/{id}
      name: spaces-id
      description: REST surface for spaces-id.
      operations:
      - method: GET
        name: getspacebyid
        description: Get Space by Id
        call: cloud-v2-space.getspacebyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/spaces/{id}/pages
      name: spaces-id-pages
      description: REST surface for spaces-id-pages.
      operations:
      - method: GET
        name: getpagesinspace
        description: Get Pages in Space
        call: cloud-v2-space.getpagesinspace
        with:
          id: rest.id
          depth: rest.depth
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-v2-space-mcp
    port: 9090
    transport: http
    description: MCP adapter for Confluence Cloud REST API v2 — Space. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-spaces
      description: Get Spaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-v2-space.getspaces
      with:
        ids: tools.ids
        keys: tools.keys
        type: tools.type
        status: tools.status
        labels: tools.labels
      outputParameters:
      - type: object
        mapping: $.
    - name: get-space-id
      description: Get Space by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-v2-space.getspacebyid
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-pages-space
      description: Get Pages in Space
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-v2-space.getpagesinspace
      with:
        id: tools.id
        depth: tools.depth
      outputParameters:
      - type: object
        mapping: $.
